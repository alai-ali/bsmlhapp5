<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSMLH MVP</title>
<style>
:root { --gold: #f6851b; --bg: #000; --wc-bg: #ededed; --neon: #00f2ff; }
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, sans-serif; }
body { background:#000; color:#fff; height:100vh; overflow:hidden; position:fixed; width:100%; }
#splash { position:fixed; inset:0; z-index:9999; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; animation:fadeOut 0.5s forwards 2.5s; pointer-events:none; }
@keyframes fadeOut { to { opacity:0; visibility:hidden; } }
.s-title { font-size:50px; font-weight:900; letter-spacing:12px; color:#fff; }
.s-sub { font-size:10px; color:#fff; margin-top:15px; text-align:center; max-width:80%; text-transform:uppercase; letter-spacing:1px; }
.screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; padding:25px; background:#000; z-index:1000; }
.active { display:flex; }
.btn-m { background:var(--gold); color:#000; border:none; padding:18px; border-radius:12px; font-weight:bold; width:100%; max-width:300px; cursor:pointer; margin-top:15px; }
.cyber-logo { width:100px; height:100px; border:2px solid var(--neon); border-radius:20px; display:flex; align-items:center; justify-content:center; margin:30px; position:relative; }
.cyber-logo::after { content:'🛡️'; font-size:45px; }
.scan-line { position:absolute; width:100%; height:2px; background:var(--neon); animation:scan 2s infinite linear; top:0; }
@keyframes scan { to { top:100%; } }
#app { display:none; height:100vh; flex-direction:column; background:var(--wc-bg); z-index:5000; position:absolute; inset:0; color:#000; }
header { height:60px; background:#1a1a1a; color:#fff; display:flex; justify-content:center; align-items:center; font-weight:600; }
.content { flex:1; overflow-y:auto; padding:10px; }
footer { height:85px; padding-bottom:25px; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #ddd; background:#f7f7f7; }
.n-btn { color:#999; font-size:10px; font-weight:bold; cursor:pointer; }
.n-btn.on { color:#07c160; }

/* PROFILE / WECHAT STYLE */
.wc-header { background:#fff; padding:40px 20px; display:flex; align-items:center; position:relative; margin-bottom:8px; border-radius:12px; }
#user-photo { width:64px; height:64px; border-radius:10px; margin-right:20px; background:#f3f3f3; object-fit:cover; }
.u-info h2 { font-size:20px; margin-bottom:4px; color:#000; }
.u-info p { color:#888; font-size:14px; }
.wc-group { background:#fff; margin-bottom:8px; border-top:0.5px solid #ddd; border-bottom:0.5px solid #ddd; border-radius:12px; overflow:hidden; }
.wc-item { display:flex; align-items:center; padding:14px 20px; position:relative; cursor:pointer; }
.wc-item:not(:last-child)::after { content: ''; position: absolute; left:55px; right:0; bottom:0; height:0.5px; background:#eee; }
.wc-icon { width:22px; margin-right:15px; font-size:20px; text-align:center; }
.wc-text { flex:1; font-size:16px; color:#000; }
.wc-arrow { color:#b2b2b2; font-size:14px; }
</style>
</head>
<body>

<div id="splash">
  <div class="s-title">BSMLH</div>
  <div class="s-sub">BIOMETRIC SECURITY MULTIFUNCTION LEDGER FOR HUMANITY</div>
</div>

<div id="scr-reg" class="screen active">
  <h2 style="margin-top:80px; margin-bottom:20px;">РЕГИСТРАЦИЯ</h2>
  <input type="text" id="in-f" placeholder="ИМЯ" style="background:#111; border:1px solid #333; padding:16px; color:#fff; border-radius:12px; width:300px; outline:none;">
  <button class="btn-m" onclick="startCam()">ДАЛЕЕ</button>
</div>

<div id="scr-scan" class="screen">
  <video id="video-feed" autoplay playsinline style="width:260px; height:260px; border-radius:50%; object-fit:cover; border:3px solid var(--gold); transform:scaleX(-1);"></video>
  <button class="btn-m" onclick="takePhoto()">СДЕЛАТЬ ФОТО</button>
</div>

<div id="scr-chip" class="screen">
  <div class="cyber-logo"><div class="scan-line"></div></div>
  <h3 id="chip-t" style="height:30px;"></h3>
  <button class="btn-m" onclick="activateChip()">СКАНИРОВАТЬ ЧИП</button>
</div>

<div id="app">
  <header>BSMLH</header>
  <div class="content" id="view-chat"></div>
  <footer>
    <div id="n-prof" class="n-btn on" onclick="tab('prof')">PROFILE</div>
  </footer>
</div>

<!-- PROFILE SCREEN -->
<div id="view-prof" class="screen" style="display:none; background:#ededed; overflow-y:auto;">
  <div class="wc-header">
    <img id="user-photo" src="" alt="">
    <div class="u-info">
      <h2 id="u-name-disp">User</h2>
      <p>ID: bsmlh_7701</p>
    </div>
  </div>

  <div class="wc-group">
    <div class="wc-item" onclick="alert('Открыть Services')">
      <span class="wc-icon">💳</span>
      <span class="wc-text">Services</span>
      <span class="wc-arrow">></span>
    </div>
  </div>

  <div class="wc-group">
    <div class="wc-item" onclick="alert('Открыть Favorites')">
      <span class="wc-icon" style="color:#ff9500;">📦</span>
      <span class="wc-text">Favorites</span>
      <span class="wc-arrow">></span>
    </div>
    <div class="wc-item" onclick="alert('Открыть Moments')">
      <span class="wc-icon" style="color:#007aff;">🖼️</span>
      <span class="wc-text">Moments</span>
      <span class="wc-arrow">></span>
    </div>
    <div class="wc-item" onclick="alert('Открыть Cards & Offers')">
      <span class="wc-icon" style="color:#5ac8fa;">🧧</span>
      <span class="wc-text">Cards & Offers</span>
      <span class="wc-arrow">></span>
    </div>
    <div class="wc-item" onclick="alert('Открыть Stickers')">
      <span class="wc-icon" style="color:#ffcc00;">😀</span>
      <span class="wc-text">Stickers</span>
      <span class="wc-arrow">></span>
    </div>
  </div>

  <div class="wc-group">
    <div class="wc-item" onclick="alert('Открыть Settings')">
      <span class="wc-icon" style="color:#4cd964;">⚙️</span>
      <span class="wc-text">Settings</span>
      <span class="wc-arrow">></span>
    </div>
  </div>
</div>

<canvas id="photo-canvas" style="display:none;"></canvas>

<script>
// Local Storage Key
const storageKey = 'bsmlh_user';

// Load saved user
window.onload = () => {
  const saved = JSON.parse(localStorage.getItem(storageKey));
  if(saved && saved.chipActive){
    document.getElementById('scr-reg').classList.remove('active');
    document.getElementById('scr-scan').classList.remove('active');
    document.getElementById('scr-chip').classList.remove('active');
    document.getElementById('app').style.display='flex';
    loadUser(saved);
  }
}

// CAMERA
async function startCam(){
    const name = document.getElementById('in-f').value.trim();
    if(!name) return alert("Введите имя");
    document.getElementById('scr-reg').classList.remove('active');
    document.getElementById('scr-scan').classList.add('active');
    try{
        const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
        const video = document.getElementById('video-feed');
        video.srcObject = stream;
        video.onloadedmetadata = ()=>video.play();
    } catch(e){
        alert("Не удалось открыть камеру");
        document.getElementById('scr-scan').classList.remove('active');
        document.getElementById('scr-reg').classList.add('active');
    }
}

function takePhoto(){
    const video = document.getElementById('video-feed');
    const canvas = document.getElementById('photo-canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video,0,0);
    const photoData = canvas.toDataURL();
    video.srcObject.getTracks().forEach(t=>t.stop());
    localStorage.setItem(storageKey, JSON.stringify({name:document.getElementById('in-f').value.trim(), photo:photoData, chipActive:false}));
    document.getElementById('scr-scan').classList.remove('active');
    document.getElementById('scr-chip').classList.add('active');
}

// CHIP SCAN
function activateChip(){
    document.getElementById('chip-t').innerText="СКАНИРОВАНИЕ...";
    setTimeout(()=>{
        const data = JSON.parse(localStorage.getItem(storageKey));
        data.chipActive=true;
        localStorage.setItem(storageKey, JSON.stringify(data));
        toApp(data);
    },2000);
}

function toApp(data){
    document.getElementById('scr-chip').classList.remove('active');
    document.getElementById('app').style.display='flex';
    loadUser(data);
}

// LOAD USER DATA
function loadUser(data){
    if(!data) data = JSON.parse(localStorage.getItem(storageKey));
    document.getElementById('u-name-disp').innerText = data.name;
    document.getElementById('user-photo').src = data.photo;
}

// PROFILE TAB
function tab(t){
    if(t==='prof'){
        document.getElementById('app').style.display='none';
        document.getElementById('view-prof').style.display='block';
    }
}
</script>
</body>
</html>
